<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YYDS Deity-Ops Console</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop offset='0' stop-color='%23fbbf24'/><stop offset='1' stop-color='%23a855f7'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='%23020204'/><rect x='10' y='10' width='80' height='80' rx='18' fill='url(%23g)' opacity='0.18'/><path d='M50 18c12 10 24 10 32 10 0 28-10 46-32 54C28 74 18 56 18 28c8 0 20 0 32-10z' fill='url(%23g)'/><path d='M34 44l16 16 18-22' stroke='%23020204' stroke-width='9' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
  
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="app">
    <aside class="sidebar" id="sidebar-container"></aside>

    <div class="main-workspace">
      <header class="header" id="header-container"></header>

      <main class="canvas" id="canvas-container">
        <!-- Tab 1: Overview -->
        <section id="view-overview" class="view-section active"></section>

        <section id="view-tickets" class="view-section"></section>

        <section id="view-inbox" class="view-section"></section>

        <section id="view-clients" class="view-section"></section>

        <section id="view-analytics" class="view-section"></section>
      </main>
    </div>
  </div>

  <div class="drawer-backdrop" id="ticket-drawer-backdrop">
    <div class="drawer" id="ticket-drawer"></div>
  </div>

  <div class="modal-backdrop" id="add-client-modal-backdrop">
    <div class="modal-card" id="add-client-modal"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
